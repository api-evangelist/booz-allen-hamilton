aid: booz-allen-hamilton
name: Booz Allen Hamilton
description: >-
  Booz Allen Hamilton is a leading management and technology consulting firm providing
  services primarily to U.S. government agencies in defense, intelligence, and civil
  markets. The firm employs over 2,500 AI specialists and 8,000 cybersecurity professionals,
  and maintains a significant open source presence on GitHub with projects including the
  Solutions Delivery Platform, Open Data Platform, and Cognition data fusion platform.
